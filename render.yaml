services:
  - type: web
    name: moneymind-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://your-frontend.vercel.app
      - key: PORT
        value: 3001

